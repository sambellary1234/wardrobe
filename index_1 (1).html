<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sam's Wardrobe</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#faf9f7;--bg-card:#ffffff;--bg-input:#f3f1ee;--bg-hover:#eeece8;
      --text:#1c1a17;--text-muted:#7a7670;--text-light:#b0ada8;
      --accent:#c9a96e;--accent-dark:#8a6530;--accent-bg:#fdf6ec;
      --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);
      --shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-hover:0 8px 28px rgba(0,0,0,0.11);
      --radius:14px;--radius-sm:8px;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#16140f;--bg-card:#1f1d18;--bg-input:#2a2720;--bg-hover:#332f28;
      --text:#f0ede6;--text-muted:#8a8780;--text-light:#5a5852;--accent-bg:#2a2318;
      --border:rgba(255,255,255,0.08);--border-md:rgba(255,255,255,0.14);
      --shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-hover:0 8px 28px rgba(0,0,0,0.45);
    }}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .site-header{padding:2rem 2rem 0;border-bottom:1px solid var(--border)}
    .site-header h1{font-family:'DM Serif Display',serif;font-size:40px;font-weight:400;line-height:1}
    .site-header p{font-size:13px;color:var(--text-muted);margin-top:5px;font-weight:300}
    .nav-tabs{display:flex;gap:0;margin-top:1.5rem}
    .nav-tab{padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;border:none;background:none;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.2s}
    .nav-tab:hover{color:var(--text)}
    .nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
    .spending-bar{background:var(--text);color:var(--bg);padding:0.85rem 2rem;display:flex;gap:2rem;flex-wrap:wrap;align-items:center}
    .spending-total{display:flex;align-items:baseline;gap:8px}
    .spending-total .amount{font-family:'DM Serif Display',serif;font-size:26px;color:var(--accent)}
    .spending-total .label{font-size:11px;opacity:0.55;text-transform:uppercase;letter-spacing:0.08em}
    .spending-breakdown{display:flex;gap:1.5rem;flex-wrap:wrap}
    .breakdown-item{display:flex;flex-direction:column;gap:1px}
    .breakdown-item .b-amount{font-size:14px;font-weight:500}
    .breakdown-item .b-label{font-size:10px;opacity:0.45;text-transform:uppercase;letter-spacing:0.06em}
    .main{padding:1.5rem 2rem;max-width:1140px;margin:0 auto}
    .view{display:none}
    .view.active{display:block}
    .categories{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
    .cat-btn{padding:6px 15px;border-radius:30px;border:1px solid var(--border-md);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--text-muted);transition:all 0.2s}
    .cat-btn:hover{color:var(--text);border-color:var(--text)}
    .cat-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
    .add-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:2rem;box-shadow:var(--shadow)}
    .add-panel summary{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;color:var(--text)}
    .add-panel summary::after{content:'＋';font-size:18px;color:var(--text-muted);margin-left:auto}
    details[open] summary::after{content:'−'}
    .add-form{margin-top:1rem}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:10px}
    .form-field{display:flex;flex-direction:column;gap:5px}
    .form-field label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)}
    .form-field input,.form-field select{height:40px;padding:0 12px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s}
    .form-field input:focus,.form-field select:focus{border-color:var(--accent)}
    .form-field input[type="color"]{padding:4px 6px;cursor:pointer}
    .url-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:6px}
    .url-row .form-field{flex:1}
    .fetch-btn{height:40px;padding:0 14px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:transparent;color:var(--accent-dark);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
    .fetch-btn:hover{background:var(--accent);color:white}
    .image-preview{width:54px;height:54px;border-radius:var(--radius-sm);border:1px dashed var(--border-md);object-fit:cover;display:none}
    .image-preview.visible{display:block}
    .fetch-status{font-size:12px;color:var(--accent-dark);min-height:18px;margin-bottom:8px}
    .add-btn{width:100%;height:44px;border-radius:var(--radius-sm);border:none;background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.15s}
    .add-btn:hover{opacity:0.85}
    .section-block{margin-bottom:2.5rem}
    .section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-light);margin-bottom:12px;display:flex;align-items:center;gap:10px}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
    .item-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.2s,transform 0.2s;position:relative;cursor:default}
    .item-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
    .item-card.selectable{cursor:pointer}
    .item-card.selectable:hover{border-color:var(--accent)}
    .item-card.selected{border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(201,169,110,0.18)}
    .item-card.selected .select-badge{display:flex}
    .select-badge{display:none;position:absolute;top:10px;left:10px;width:24px;height:24px;border-radius:50%;background:var(--accent);color:white;align-items:center;justify-content:center;font-size:13px;font-weight:600}
    .item-image-wrap{width:100%;height:150px;overflow:hidden;background:var(--bg-input);display:flex;align-items:center;justify-content:center}
    .item-image-wrap img{width:100%;height:100%;object-fit:cover}
    .item-color-block{width:100%;height:150px}
    .item-body{padding:11px 13px}
    .item-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-cat{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px}
    .item-footer{display:flex;align-items:center;justify-content:space-between;gap:6px}
    .item-price{font-family:'DM Serif Display',serif;font-size:16px;color:var(--accent-dark)}
    .item-link{font-size:11px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border-md);padding:3px 9px;border-radius:20px;transition:all 0.15s}
    .item-link:hover{background:var(--bg-input);color:var(--text)}
    .item-delete{position:absolute;top:10px;right:10px;width:25px;height:25px;border-radius:50%;background:rgba(0,0,0,0.5);color:white;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s}
    .item-card:hover .item-delete{opacity:1}
    .empty{grid-column:1/-1;padding:2.5rem;text-align:center;color:var(--text-muted);font-size:14px;background:var(--bg-card);border:1px dashed var(--border-md);border-radius:var(--radius)}
    /* OUTFIT BUILDER */
    .outfit-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
    .outfit-slots h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:4px}
    .outfit-slots>p{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem}
    .slot-section{margin-bottom:1.5rem}
    .slot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .slot-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)}
    .slot-clear{font-size:11px;color:var(--text-light);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
    .slot-clear:hover{color:var(--text-muted)}
    .slot-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:var(--border-md) transparent}
    .slot-scroll::-webkit-scrollbar{height:4px}
    .slot-scroll::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
    .slot-item{flex-shrink:0;width:110px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:all 0.15s}
    .slot-item:hover{border-color:var(--accent);transform:translateY(-1px)}
    .slot-item.selected{border:2px solid var(--accent)}
    .slot-item-img{width:100%;height:90px;object-fit:cover;background:var(--bg-input);display:block}
    .slot-item-color{width:100%;height:90px}
    .slot-item-name{font-size:11px;padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
    .no-items-slot{font-size:13px;color:var(--text-light);padding:1rem 0}
    .outfit-preview{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);position:sticky;top:1rem}
    .outfit-preview h3{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;margin-bottom:1rem}
    .preview-slots{display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem}
    .preview-slot{display:flex;align-items:center;gap:12px;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-input);min-height:64px}
    .preview-slot-img{width:50px;height:50px;border-radius:6px;object-fit:cover;flex-shrink:0}
    .preview-slot-color{width:50px;height:50px;border-radius:6px;flex-shrink:0}
    .preview-slot-empty{width:50px;height:50px;border-radius:6px;flex-shrink:0;background:var(--bg-hover);border:1px dashed var(--border-md);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-light)}
    .preview-slot-info{flex:1;min-width:0}
    .preview-slot-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .preview-slot-cat{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em}
    .preview-slot-empty-text{font-size:13px;color:var(--text-light);font-style:italic}
    .outfit-total{display:flex;align-items:baseline;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);margin-bottom:10px}
    .outfit-total-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em}
    .outfit-total-amount{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent-dark)}
    .save-outfit-btn{width:100%;height:42px;border-radius:var(--radius-sm);border:none;background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.15s;margin-bottom:8px}
    .save-outfit-btn:hover{opacity:0.85}
    .clear-outfit-btn{width:100%;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s}
    .clear-outfit-btn:hover{background:var(--bg-input);color:var(--text)}
    .saved-outfits{margin-top:2rem}
    .saved-outfits h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:1rem}
    .saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .saved-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.2s,transform 0.2s;position:relative}
    .saved-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
    .saved-card-images{display:grid;grid-template-columns:1fr 1fr;height:140px;overflow:hidden;gap:2px}
    .saved-card-images.one{grid-template-columns:1fr}
    .saved-card-images.three .sc-img:last-child,.saved-card-images.three .sc-color:last-child{grid-column:span 2}
    .sc-img{width:100%;height:100%;object-fit:cover;display:block}
    .sc-color{width:100%;height:100%;display:block}
    .saved-card-body{padding:12px 14px}
    .saved-card-name{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text)}
    .saved-card-pieces{font-size:12px;color:var(--text-muted);margin-bottom:6px}
    .saved-card-price{font-family:'DM Serif Display',serif;font-size:16px;color:var(--accent-dark)}
    .saved-delete{position:absolute;top:8px;right:8px;width:25px;height:25px;border-radius:50%;background:rgba(0,0,0,0.5);color:white;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s}
    .saved-card:hover .saved-delete{opacity:1}
    .outfit-name-row{display:flex;gap:8px;margin-bottom:8px}
    .outfit-name-row input{flex:1;height:36px;padding:0 10px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
    .outfit-name-row input:focus{border-color:var(--accent)}
    @media(max-width:780px){
      .outfit-layout{grid-template-columns:1fr}
      .outfit-preview{position:static}
      .site-header h1{font-size:30px}
      .spending-bar{padding:0.85rem 1rem;gap:1rem}
      .main{padding:1rem}
    }
  </style>
</head>
<body>
<header class="site-header">
  <h1>Sam's Wardrobe</h1>
  <p>Track your clothing, spending &amp; style</p>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showView('wardrobe',this)">Wardrobe</button>
    <button class="nav-tab" onclick="showView('outfits',this)">Outfit Builder</button>
  </nav>
</header>

<div class="spending-bar" id="spendingBar"></div>

<main class="main">
  <!-- WARDROBE VIEW -->
  <div class="view active" id="view-wardrobe">
    <div class="categories" id="categoryTabs"></div>
    <div class="add-panel">
      <details>
        <summary>Add a new item</summary>
        <div class="add-form">
          <div class="form-grid">
            <div class="form-field" style="grid-column:span 2">
              <label>Item name</label>
              <input type="text" id="itemName" placeholder="e.g. White linen shirt" />
            </div>
            <div class="form-field">
              <label>Category</label>
              <select id="itemCategory">
                <option value="tops">Tops</option>
                <option value="shirts">Shirts / Graphic Tees</option>
                <option value="pants">Pants &amp; Jeans</option>
                <option value="jackets">Jackets &amp; Blazers</option>
                <option value="hoodies">Hoodies &amp; Sweaters</option>
                <option value="athleisure">Athleisure</option>
                <option value="dresses">Dresses</option>
                <option value="shoes">Shoes</option>
              </select>
            </div>
            <div class="form-field">
              <label>Price paid ($)</label>
              <input type="number" id="itemPrice" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="form-field">
              <label>Color</label>
              <input type="color" id="itemColor" value="#c4b9a8" />
            </div>
          </div>
          <div class="url-row">
            <div class="form-field">
              <label>Purchase URL</label>
              <input type="url" id="itemUrl" placeholder="https://..." />
            </div>
            <button class="fetch-btn" onclick="fetchImage()">↓ Fetch image</button>
            <img id="previewImg" class="image-preview" alt="preview" />
          </div>
          <div class="fetch-status" id="fetchStatus"></div>
          <div class="form-field" style="margin-bottom:12px">
            <label>Or paste image URL directly</label>
            <input type="url" id="itemImageUrl" placeholder="https://..." oninput="manualImagePreview()" />
          </div>
          <button class="add-btn" onclick="addItem()">+ Add to wardrobe</button>
        </div>
      </details>
    </div>
    <div id="itemsContainer"></div>
  </div>

  <!-- OUTFIT BUILDER VIEW -->
  <div class="view" id="view-outfits">
    <div class="outfit-layout">
      <div class="outfit-slots">
        <h2>Build an outfit</h2>
        <p>Tap any piece to add or swap it in your outfit</p>
        <div id="outfitSlots"></div>
      </div>
      <div class="outfit-preview">
        <h3>Today's outfit</h3>
        <div class="preview-slots" id="previewSlots"></div>
        <div class="outfit-total">
          <span class="outfit-total-label">Outfit value</span>
          <span class="outfit-total-amount" id="outfitTotal">$0.00</span>
        </div>
        <div class="outfit-name-row">
          <input type="text" id="outfitName" placeholder="Name this outfit…" />
        </div>
        <button class="save-outfit-btn" onclick="saveOutfit()">Save outfit</button>
        <button class="clear-outfit-btn" onclick="clearOutfit()">Clear all</button>
      </div>
    </div>
    <div class="saved-outfits">
      <h2>Saved outfits</h2>
      <div class="saved-grid" id="savedOutfitsGrid"></div>
    </div>
  </div>
</main>

var PRESET_OUTFITS = [{"id":9001,"name":"Work Outfit 1","items":[48,39,28,23]},{"id":9002,"name":"Work Outfit 2","items":[50,21,32,23]},{"id":9003,"name":"California Look \u2013 Tuesday","items":[47,33,11]},{"id":9004,"name":"California Look \u2013 Wednesday","items":[41,31,24]}];

var CATS = [
  {id:'tops',      label:'Tops',               icon:'👚'},
  {id:'shirts',    label:'Shirts / Graphic Tees',icon:'👕'},
  {id:'pants',     label:'Pants & Jeans',       icon:'👖'},
  {id:'jackets',   label:'Jackets & Blazers',   icon:'🧥'},
  {id:'hoodies',   label:'Hoodies & Sweaters',  icon:'🩶'},
  {id:'athleisure',label:'Athleisure',           icon:'🏃'},
  {id:'dresses',   label:'Dresses',              icon:'👗'},
  {id:'shoes',     label:'Shoes',                icon:'👟'},
];

var items = [];
var savedOutfits = [];
var activeCategory = 'all';
var fetchedImageUrl = '';
var currentOutfit = {tops:null,shirts:null,pants:null,jackets:null,hoodies:null,athleisure:null,dresses:null,shoes:null};

function loadData(){
  var si = localStorage.getItem('wardrobe-v4');
  var so = localStorage.getItem('wardrobe-outfits-v2');
  if(si){ try{ items=JSON.parse(si); }catch(e){ items=[]; } }
  else { items = PRESET_ITEMS.map(function(i){ return Object.assign({},i); }); saveItems(); }
  if(so){ try{ savedOutfits=JSON.parse(so); }catch(e){ savedOutfits=[]; } }
  else { savedOutfits = PRESET_OUTFITS.map(function(o){ return Object.assign({},o); }); saveOutfitsData(); }
}
function saveItems(){ try{ localStorage.setItem('wardrobe-v4',JSON.stringify(items)); }catch(e){} }
function saveOutfitsData(){ try{ localStorage.setItem('wardrobe-outfits-v2',JSON.stringify(savedOutfits)); }catch(e){} }

function showView(name,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='outfits') renderOutfitBuilder();
}

async function fetchImage(){
  var url=document.getElementById('itemUrl').value.trim();
  if(!url){setStatus('Please enter a purchase URL first.');return;}
  setStatus('Fetching product image…'); fetchedImageUrl='';
  document.getElementById('previewImg').classList.remove('visible');
  try{
    var res=await fetch('https://api.microlink.io/?url='+encodeURIComponent(url));
    var data=await res.json();
    var img=(data&&data.data&&data.data.image&&data.data.image.url)||'';
    if(img){
      fetchedImageUrl=img;
      var p=document.getElementById('previewImg');
      p.src=img; p.classList.add('visible');
      document.getElementById('itemImageUrl').value=img;
      setStatus('Image found!');
    } else { setStatus('No image found — paste an image URL manually.'); }
  } catch(e){ setStatus('Could not fetch image.'); }
}
function manualImagePreview(){
  var url=document.getElementById('itemImageUrl').value.trim();
  fetchedImageUrl=url;
  var p=document.getElementById('previewImg');
  if(url){p.src=url;p.classList.add('visible');}else p.classList.remove('visible');
}
function setStatus(m){document.getElementById('fetchStatus').textContent=m;}

function addItem(){
  var name=document.getElementById('itemName').value.trim();
  if(!name){alert('Please enter an item name.');return;}
  var cat=document.getElementById('itemCategory').value;
  var color=document.getElementById('itemColor').value;
  var priceRaw=parseFloat(document.getElementById('itemPrice').value);
  var price=isNaN(priceRaw)?0:priceRaw;
  var purchaseUrl=document.getElementById('itemUrl').value.trim();
  var imageUrl=document.getElementById('itemImageUrl').value.trim()||fetchedImageUrl;
  items.push({id:Date.now(),name:name,category:cat,color:color,price:price,purchaseUrl:purchaseUrl,imageUrl:imageUrl});
  document.getElementById('itemName').value='';
  document.getElementById('itemPrice').value='';
  document.getElementById('itemUrl').value='';
  document.getElementById('itemImageUrl').value='';
  document.getElementById('previewImg').classList.remove('visible');
  fetchedImageUrl=''; setStatus('');
  saveItems(); renderWardrobe();
}
function deleteItem(id){
  if(!confirm('Remove this item?'))return;
  items=items.filter(function(i){return i.id!==id;});
  CATS.forEach(function(c){if(currentOutfit[c.id]&&currentOutfit[c.id].id===id)currentOutfit[c.id]=null;});
  saveItems(); renderWardrobe();
}

function fmt(n){return'$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

function render(){renderSpending();renderCategoryTabs();renderItems();}
function renderWardrobe(){renderSpending();renderCategoryTabs();renderItems();}

function renderSpending(){
  var total=items.reduce(function(s,i){return s+(i.price||0);},0);
  var bar=document.getElementById('spendingBar');
  var bd=CATS.map(function(c){
    var sum=items.filter(function(i){return i.category===c.id;}).reduce(function(s,i){return s+(i.price||0);},0);
    if(!sum)return'';
    return'<div class="breakdown-item"><span class="b-amount">'+fmt(sum)+'</span><span class="b-label">'+c.label+'</span></div>';
  }).join('');
  bar.innerHTML='<div class="spending-total"><span class="amount">'+fmt(total)+'</span><span class="label">Total tracked</span></div>'
    +(bd?'<div class="spending-breakdown">'+bd+'</div>':'');
}

function renderCategoryTabs(){
  var tabs=document.getElementById('categoryTabs');
  var all=[{id:'all',label:'All'}].concat(CATS);
  tabs.innerHTML=all.map(function(c){
    var count=c.id==='all'?items.length:items.filter(function(i){return i.category===c.id;}).length;
    var spending=c.id==='all'?items.reduce(function(s,i){return s+(i.price||0);},0):items.filter(function(i){return i.category===c.id;}).reduce(function(s,i){return s+(i.price||0);},0);
    return'<button class="cat-btn'+(activeCategory===c.id?' active':'')+'" onclick="setCategory(\''+c.id+'\')">'
      +c.label+(count>0?' &middot; '+count:'')+(spending>0?' &middot; '+fmt(spending):'')+' </button>';
  }).join('');
}
function setCategory(cat){activeCategory=cat;renderItems();}

function renderItems(){
  var container=document.getElementById('itemsContainer');
  var filtered=activeCategory==='all'?items:items.filter(function(i){return i.category===activeCategory;});
  if(!filtered.length){container.innerHTML='<div class="items-grid"><div class="empty">No items yet</div></div>';return;}
  if(activeCategory==='all'){
    var byCat={};
    filtered.forEach(function(item){if(!byCat[item.category])byCat[item.category]=[];byCat[item.category].push(item);});
    var order=CATS.map(function(c){return c.id;});
    var html='';
    order.forEach(function(cat){
      if(!byCat[cat])return;
      var ci=byCat[cat];
      var ct=ci.reduce(function(s,i){return s+(i.price||0);},0);
      var catObj=CATS.find(function(c){return c.id===cat;})||{label:cat};
      html+='<div class="section-block"><div class="section-label">'+catObj.label+(ct>0?' &nbsp;&middot; '+fmt(ct):'')+' </div>'
        +'<div class="items-grid">'+ci.map(wardrobeCard).join('')+'</div></div>';
    });
    container.innerHTML=html;
  } else {
    container.innerHTML='<div class="items-grid">'+filtered.map(wardrobeCard).join('')+'</div>';
  }
}
function wardrobeCard(item){
  var sc=item.color||'#c4b9a8';
  var imgArea=item.imageUrl
    ?'<div class="item-image-wrap"><img src="'+item.imageUrl+'" alt="'+esc(item.name)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=item-color-block style=background:'+sc+'></div>\'"/></div>'
    :'<div class="item-color-block" style="background:'+sc+'"></div>';
  var linkHtml=item.purchaseUrl?'<a class="item-link" href="'+item.purchaseUrl+'" target="_blank" rel="noopener">Shop ↗</a>':'';
  var priceHtml=item.price>0?'<span class="item-price">'+fmt(item.price)+'</span>':'<span class="item-price" style="opacity:0.3">—</span>';
  return'<div class="item-card"><button class="item-delete" onclick="deleteItem('+item.id+')" title="Remove">&times;</button>'
    +imgArea+'<div class="item-body"><div class="item-name" title="'+esc(item.name)+'">'+esc(item.name)+'</div>'
    +'<div class="item-cat">'+item.category+'</div>'
    +'<div class="item-footer">'+priceHtml+linkHtml+'</div></div></div>';
}

/* OUTFIT BUILDER */
function renderOutfitBuilder(){renderOutfitSlots();renderOutfitPreview();renderSavedOutfits();}

function renderOutfitSlots(){
  var el=document.getElementById('outfitSlots');
  el.innerHTML=CATS.map(function(cat){
    var catItems=items.filter(function(i){return i.category===cat.id;});
    var selected=currentOutfit[cat.id];
    var header='<div class="slot-section"><div class="slot-header">'
      +'<span class="slot-title">'+cat.icon+' '+cat.label+'</span>'
      +(selected?'<button class="slot-clear" onclick="clearSlot(\''+cat.id+'\')">Remove</button>':'')
      +'</div>';
    if(!catItems.length) return header+'<div class="no-items-slot">No '+cat.label.toLowerCase()+' added yet</div></div>';
    var cards=catItems.map(function(item){
      var isSelected=selected&&selected.id===item.id;
      var sc=item.color||'#c4b9a8';
      var img=item.imageUrl
        ?'<img class="slot-item-img" src="'+item.imageUrl+'" alt="'+esc(item.name)+'" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'">'
          +'<div class="slot-item-color" style="background:'+sc+';display:none"></div>'
        :'<div class="slot-item-color" style="background:'+sc+'"></div>';
      return'<div class="slot-item'+(isSelected?' selected':'')+'" onclick="toggleSlot(\''+cat.id+'\','+item.id+')">'
        +img+'<div class="slot-item-name">'+esc(item.name)+'</div></div>';
    }).join('');
    return header+'<div class="slot-scroll">'+cards+'</div></div>';
  }).join('');
}
function toggleSlot(cat,itemId){
  var item=items.find(function(i){return i.id===itemId;});
  if(!item)return;
  currentOutfit[cat]=(currentOutfit[cat]&&currentOutfit[cat].id===itemId)?null:item;
  renderOutfitBuilder();
}
function clearSlot(cat){currentOutfit[cat]=null;renderOutfitBuilder();}
function clearOutfit(){CATS.forEach(function(c){currentOutfit[c.id]=null;});document.getElementById('outfitName').value='';renderOutfitBuilder();}

function renderOutfitPreview(){
  var slots=document.getElementById('previewSlots');
  var total=0;
  slots.innerHTML=CATS.map(function(cat){
    var item=currentOutfit[cat.id];
    if(!item){
      return'<div class="preview-slot"><div class="preview-slot-empty">'+cat.icon+'</div>'
        +'<span class="preview-slot-empty-text">No '+cat.label.toLowerCase()+' selected</span></div>';
    }
    total+=(item.price||0);
    var sc=item.color||'#c4b9a8';
    var thumb=item.imageUrl
      ?'<img class="preview-slot-img" src="'+item.imageUrl+'" alt="'+esc(item.name)+'" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'">'
        +'<div class="preview-slot-color" style="background:'+sc+';display:none"></div>'
      :'<div class="preview-slot-color" style="background:'+sc+'"></div>';
    return'<div class="preview-slot">'+thumb
      +'<div class="preview-slot-info"><div class="preview-slot-name">'+esc(item.name)+'</div>'
      +'<div class="preview-slot-cat">'+item.category+(item.price>0?' · '+fmt(item.price):'')+' </div>'
      +'</div></div>';
  }).join('');
  document.getElementById('outfitTotal').textContent=fmt(total);
}

function saveOutfit(){
  var selected=CATS.map(function(c){return currentOutfit[c.id];}).filter(Boolean);
  if(!selected.length){alert('Select at least one item to save an outfit.');return;}
  var name=document.getElementById('outfitName').value.trim()||('Outfit '+(savedOutfits.length+1));
  savedOutfits.push({id:Date.now(),name:name,items:selected.map(function(i){return i.id;})});
  saveOutfitsData();
  document.getElementById('outfitName').value='';
  clearOutfit(); renderSavedOutfits();
}
function deleteSavedOutfit(id){
  if(!confirm('Delete this saved outfit?'))return;
  savedOutfits=savedOutfits.filter(function(o){return o.id!==id;});
  saveOutfitsData(); renderSavedOutfits();
}
function renderSavedOutfits(){
  var grid=document.getElementById('savedOutfitsGrid');
  if(!savedOutfits.length){grid.innerHTML='<div style="grid-column:1/-1;color:var(--text-light);font-size:14px;padding:1rem 0">No outfits saved yet</div>';return;}
  grid.innerHTML=savedOutfits.map(function(outfit){
    var outfitItems=outfit.items.map(function(id){return items.find(function(i){return i.id===id;});}).filter(Boolean);
    var total=outfitItems.reduce(function(s,i){return s+(i.price||0);},0);
    var imgs=outfitItems.slice(0,4).map(function(item){
      var sc=item.color||'#c4b9a8';
      return item.imageUrl
        ?'<img class="sc-img" src="'+item.imageUrl+'" alt="'+esc(item.name)+'" loading="lazy" onerror="this.style.background=\''+sc+'\';this.src=\'\'">'
        :'<div class="sc-color" style="background:'+sc+'"></div>';
    }).join('');
    var cc=outfitItems.length===1?'one':outfitItems.length===3?'three':'';
    return'<div class="saved-card"><button class="saved-delete" onclick="deleteSavedOutfit('+outfit.id+')">&times;</button>'
      +'<div class="saved-card-images '+cc+'">'+imgs+'</div>'
      +'<div class="saved-card-body"><div class="saved-card-name">'+esc(outfit.name)+'</div>'
      +'<div class="saved-card-pieces">'+outfitItems.length+' piece'+(outfitItems.length!==1?'s':'')+'</div>'
      +(total>0?'<div class="saved-card-price">'+fmt(total)+'</div>':'')
      +'</div></div>';
  }).join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('itemName').addEventListener('keydown',function(e){if(e.key==='Enter')addItem();});
loadData();
render();
</script>
</body>
</html>
